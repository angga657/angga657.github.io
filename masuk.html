<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" href="masuk.css">

  <body>
    
    <!-- Form Start -->
    <div class="container">
        <form class="login-container">
            <h3 class="textjudul text-center mb-5">Masuk</h3>
            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label">Email</label>
              <div class="input-group mb-3">
                <span class="input-group-text material-icons" id="basic-addon1">mail</span>
                <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Email">
              </div>
            </div>
            <div class="mb-3">
              <label for="exampleInputEmail1" class="form-label">Password</label>
              <div class="input-group mb-3">
                <span class="input-group-text material-icons" id="basic-addon1">key</span>
                <input type="password" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Password">
              </div>
            </div>
            <div class="text-end">
            <a href="#" class="textform text-hover">Lupa Password</a>
            </div>
            <div class="d-grid textform mt-5">
            <button type="submit" class="btn btn-outline-primary">Masuk</button>
            </div>
            <div class="mt-3">
                <span class="textform">Belum Punya Akun? <a href="registrasi.html" class="text-hover">Daftar</a></span>
            </div>
          </form>
    </div>
    <!-- Form End -->

    <!-- Optional JavaScript; choose one of the two! -->

    <!-- Option 1: Bootstrap Bundle with Popper -->
